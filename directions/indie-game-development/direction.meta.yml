direction:
  id: indie_game_development
  name: Indie Game Development
  status: active
  source_of_truth: github_markdown
  github_repo: "https://github.com/ainazemtsau/my_global_workflow"
  repo_path: "directions/indie-game-development"

chatgpt:
  project_name: "Indie Game Development"
  default_files:
    - "directions/indie-game-development/project_files/00_DIRECTION_START_HERE.md"
    - "directions/indie-game-development/project_files/01_DIRECTION_STATE.md"
    - "directions/indie-game-development/project_files/02_CURRENT_PHASE.md"
    - "directions/indie-game-development/project_files/03_FOCUS_REGISTER.md"
    - "directions/indie-game-development/project_files/04_ACTIVE_GOAL.md"
    - "directions/indie-game-development/project_files/05_PORTFOLIO_QUEUE.md"
    - "directions/indie-game-development/project_files/06_CONTEXT_LIBRARY_INDEX.md"
    - "workflow/runtime/WF_VNEXT_R_RUNTIME_CORE.md"

documentation:
  source_of_truth: github_markdown
  knowledge:
    path: "directions/indie-game-development/knowledge"
    role: "stable reusable Direction knowledge, decisions, canon, patterns, and reviews"
  domain_docs:
    path: "directions/indie-game-development/domain_docs"
    role: "canonical domain documentation for this Direction"
  game_documentation:
    path: "directions/indie-game-development/domain_docs/game_documentation"
    status: active
    role: "canonical game documentation used for design, planning, implementation, review, and canon checks"
projects:
  embedded:
    - id: indie_game_development_notes
      path: "directions/indie-game-development/projects/indie-game-development-notes"
      type: markdown_notes
      github_repo: null
      purpose: "Small Direction-specific local project files that do not need a separate repository."
  external_repos:
    - id: indie_game_development_main
      name: "Indie Game Development Main Repo"
      github_repo: null
      local_path_windows: null
      local_path_mac: null
      status: not_created
      purpose: "Concrete external project repo, created later if needed."
      codex_allowed: false
